<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Búsqueda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <span>🎮 TorneoApp</span>
  <a href="index.html">Torneos</a>
  <a href="stats.html">Estadísticas</a>
  <a href="search.html" class="active">Búsqueda</a>
  <a href="sponsors.html">Sponsors</a>
  <a href="inscripcion.html">Inscripción</a>
</nav>

<div class="container">
  <h1>🔍 Búsqueda</h1>
  <p style="color:#9ca3af; margin-bottom:20px">Busca jugadores por gamertag o país, y equipos por nombre.</p>

  <div class="search-row">
    <input type="text" id="input-busqueda" placeholder="Ej: Chile, ProPlayer123, Team Alpha..." onkeydown="if(event.key==='Enter') buscar()">
    <button onclick="buscar()">Buscar</button>
  </div>

  <div id="resultados"></div>
</div>

<script>
  let autoRefreshActivo = false;

  async function buscar() {
    const q = document.getElementById('input-busqueda').value.trim();
    if (!q) return;

    const res = await fetch(`/api/buscar?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const div = document.getElementById('resultados');

    let html = '';

    // Jugadores
    html += `<h2>👤 Jugadores (${data.jugadores.length})</h2>`;
    if (data.jugadores.length === 0) {
      html += '<p class="empty">Sin resultados.</p>';
    } else {
      html += `<table>
        <thead><tr><th>Gamertag</th><th>Nombre real</th><th>País</th><th>Equipo</th></tr></thead>
        <tbody>${data.jugadores.map(j => `
          <tr>
            <td>${j.gamertag}</td>
            <td>${j.nombre_real}</td>
            <td>${j.pais}</td>
            <td>${j.equipo || '—'}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
    }

    // Equipos
    html += `<h2>🛡️ Equipos (${data.equipos.length})</h2>`;
    if (data.equipos.length === 0) {
      html += '<p class="empty">Sin resultados.</p>';
    } else {
      html += `<table>
        <thead><tr><th>Nombre</th><th>N° jugadores</th><th>Jugadores</th></tr></thead>
        <tbody>${data.equipos.map(e => `
          <tr>
            <td>${e.nombre}</td>
            <td>${e.num_jugadores}</td>
            <td>${e.jugadores && e.jugadores.length ? e.jugadores.join(', ') : '—'}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
    }

    div.innerHTML = html;
  }

  function iniciarAutoRefresh() {
    if (autoRefreshActivo) return;
    autoRefreshActivo = true;

    setInterval(() => {
      if (document.hidden) return;
      if (document.getElementById('input-busqueda').value.trim()) {
        buscar();
      }
    }, 10000);
  }

  iniciarAutoRefresh();
</script>
</body>
</html>
